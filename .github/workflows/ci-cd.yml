name: CI/CD Pipeline

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  build_test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: app/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install pytest ruff

      - name: Lint (ruff)
        run: |
          ruff check app

      - name: Run tests (pytest)
        run: |
          pytest -q

  docker_build_push_deploy:
    name: Build, Push, Deploy (GHCR -> OCI VM)
    runs-on: ubuntu-latest
    needs: build_test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/cloud-ci-cd-project:latest
            ghcr.io/${{ github.repository_owner }}/cloud-ci-cd-project:${{ github.sha }}

      - name: Deploy to OCI VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ${{ secrets.OCI_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            set -euo pipefail

            IMAGE="ghcr.io/${{ github.repository_owner }}/cloud-ci-cd-project:${{ github.sha }}"

            # Make sure docker is installed
            if ! command -v docker >/dev/null 2>&1; then
              sudo apt-get update
              sudo apt-get install -y docker.io
              sudo usermod -aG docker $USER || true
            fi

            # Pull new image
            sudo docker pull "$IMAGE"

            # Replace container
            sudo docker rm -f cicd-demo || true
            sudo docker run -d --name cicd-demo --restart unless-stopped -p 5000:5000 "$IMAGE"

            # Simple health check
            curl -fsS http://localhost:5000 >/dev/null
            echo "Deployed $IMAGE"
